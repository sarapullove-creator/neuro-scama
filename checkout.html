<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВЕРИФИКАЦИЯ — NEURO-GENESIS</title>
    <style>
        body { background: #020205; color: #00f2ff; font-family: 'Courier New', Courier, monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { border: 1px solid #00f2ff; padding: 30px; max-width: 400px; width: 100%; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #bc13fe; color: #fff; outline: none; }
        .btn { width: 100%; padding: 15px; background: #00f2ff; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #bc13fe; color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <h3>ИНИЦИАЛИЗАЦИЯ ЛИЧНОСТИ</h3>
        <p style="font-size: 0.7rem; color: #555;">Введите данные для доступа к ядру системы</p>
        <form id="f">
            <input type="text" name="n" placeholder="Идентификатор (Имя)" required>
            <input type="text" name="tg" placeholder="Telegram @ID" required>
            <select name="status">
                <option>ГОТОВ ПОКИНУТЬ МАТРИЦУ</option>
                <option>ЕЩЕ СОМНЕВАЮСЬ</option>
            </select>
            <button type="submit" class="btn">ОТПРАВИТЬ ДАННЫЕ</button>
        </form>
    </div>
    <script>
        document.getElementById('f').onsubmit = (e) => {
            e.preventDefault();
            alert("Критическая ошибка доступа: Твой уровень осознанности слишком высок для текущего тарифа. Оператор свяжется с тобой вручную.");
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
