<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хозяин Нейросетей — Путь к Миллиардам</title>
    <style>
        :root {
            --gold: #ffd700;
            --gold-gradient: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c);
            --dark: #0a0a0a;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--dark); color: white;
            text-align: center; overflow-x: hidden;
        }

        /* --- Секция 1: Главная --- */
        section { min-height: 100vh; padding: 80px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .hero { background: radial-gradient(circle, #1a1a1a 0%, #000 100%); position: relative; }
        
        h1 { font-size: clamp(2rem, 8vw, 4rem); background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin: 10px; }
        
        .timer { font-size: 1.5rem; color: #ff4e50; margin: 20px; font-weight: bold; border: 2px solid #ff4e50; padding: 10px 20px; border-radius: 10px; display: inline-block; }

        .main-button {
            display: inline-block; background: linear-gradient(145deg, #ff4e50, #f9d423);
            border: none; padding: 25px 50px; font-size: 1.5rem; font-weight: bold;
            color: #000; border-radius: 50px; cursor: pointer; text-decoration: none;
            box-shadow: 0 10px 30px rgba(255, 78, 80, 0.4); transition: 0.3s;
        }
        .main-button:hover { transform: scale(1.1); box-shadow: 0 15px 40px rgba(255, 215, 0, 0.5); }

        /* --- Секция 2: Успешный успех --- */
        .success-life { background: #111; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; margin-top: 40px; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid rgba(255,215,0,0.1); transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .card i { font-size: 3rem; margin-bottom: 15px; display: block; }

        /* --- Секция 3: Отзывы --- */
        .reviews { background: #050505; }
        .review-card { font-style: italic; color: #ccc; max-width: 600px; margin: 20px auto; padding: 20px; border-left: 4px solid var(--gold); background: #111; text-align: left; }
