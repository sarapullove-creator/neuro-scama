<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хозяин Нейросетей — Элитный Развод</title>
    <style>
        :root {
            --gold: #ffd700;
            --gold-gradient: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c);
            --chat-bg: #1a1a1a;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            color: white;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; overflow-x: hidden; text-align: center;
        }

        .wrapper {
            width: 90%; max-width: 600px; padding: 40px 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(255, 215, 0, 0.02);
            border-radius: 20px; backdrop-filter: blur(10px); z-index: 10;
        }

        h1 {
            font-size: clamp(1.5rem, 6vw, 3rem);
            background: var(--gold-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .main-button {
            display: inline-block;
            background: linear-gradient(145deg, #ff4e50, #f9d423);
            border: none; padding: 20px 40px;
            font-size: clamp(1rem, 4vw, 1.5rem); font-weight: bold;
            color: #000; border-radius: 50px; cursor: pointer;
            text-decoration: none; margin: 20px 0; transition: 0.2s;
        }

        /* --- Кнопка вызова чата --- */
        #chat-trigger {
            position: fixed; bottom: 20px; right: 20px;
            width: 60px; height: 60px;
            background: var(--gold-gradient);
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
            z-index: 1001; transition: 0.3s;
        }
        #chat-trigger:hover { transform: scale(1.1); }
        #chat-trigger img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #000; }

        .notification-badge {
            position: absolute; top: 0; right: 0;
            width: 20px; height: 20px; background: red;
            border-radius: 50%; border: 2px solid white;
            display: none; /* Появится при новом сообщении */
        }

        /* --- Окно чата --- */
        #chat-window {
            position: fixed; bottom: 90px; right: 20px;
            width: 320px; height: 450px;
            background: var(--chat-bg); border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
            z-index: 1000; border: 1px solid rgba(255,215,0,0.2);
            opacity: 0; visibility: hidden; transform: translateY(20px);
            transition: 0.3s;
        }
        #chat-window.open { opacity: 1; visibility: visible; transform: translateY(0); }

        .chat-header {
            background: #222; padding: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #333; border-radius: 15px 15px 0 0;
        }
        .close-btn { cursor: pointer; font-size: 1.5rem; color: #888; line-height: 1; }
        .close-btn:hover { color: white; }

        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px; border-radius: 10px; font-size: 0.9rem; text-align: left; animation: pop 0.3s forwards; }
        .msg.gleb { background: #333; align-self: flex-start; border-bottom-left-radius: 0; }
        .msg.gold { background: var(--gold); color: #000; font-weight: bold; }

        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* Убегающая форма */
        .input-container { position: relative; height: 80px; margin-top: 20px; }
        #runaway-input { position: absolute; left: 50%; transform: translateX(-50%); padding: 10px; border: 1px solid var(--gold); background: #222; color: #fff; border-radius: 5px; cursor: not-allowed; }

        /* Декор */
        .money-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .symbol { position: absolute; color: var(--gold); opacity: 0.1; animation: fall 5s infinite linear; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div class="money-bg" id="money-box"></div>

    <div class="wrapper">
        <h1>ХОЗЯИН НЕЙРОСЕТЕЙ</h1>
        <p>Стань богатым (в своих мечтах) уже сегодня!</p>
        <a href="#" class="main-button" onclick="alert('Деньги списаны! Успех близок как никогда.')">ХОЧУ ПОТЕРЯТЬ ДЕНЬГИ</a>
        
        <div class="input-container" id="box">
            <input type="text" id="runaway-input" placeholder="Тут твоя почта..." readonly>
        </div>
    </div>

    <div id="chat-trigger">
        <div class="notification-badge" id="badge"></div>
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Глеб">
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <span style="font-weight: bold; color: var(--gold)">Успешный Глеб</span>
            <span class="close-btn" id="close-chat">&times;</span>
        </div>
        <div class="chat-messages" id="messages"></div>
    </div>

    <script>
        // Анимация денег
        const box = document.getElementById('money-box');
        for(let i=0; i<15; i++) {
            let s = document.createElement('div'); s.className='symbol'; s.innerText='$';
            s.style.left = Math.random()*100+'vw'; s.style.animationDuration = (2+Math.random()*3)+'s';
            box.appendChild(s);
        }

        // Убегающее поле
        const inp = document.getElementById('runaway-input');
        const b = document.getElementById('box');
        inp.onmouseover = () => {
            inp.style.left = Math.random()*80 + '%';
            inp.style.top = Math.random()*50 + 'px';
        };

        // Логика чата
        const trigger = document.getElementById('chat-trigger');
        const windowChat = document.getElementById('chat-window');
        const closeBtn = document.getElementById('close-chat');
        const msgContainer = document.getElementById('messages');
        const badge = document.getElementById('badge');

        const script = [
            "Приветик! Готов инвестировать в мой новый крипто-нейро-чай?",
            "У меня тут как раз освободилось одно VIP-место за 999,000₽.",
            "Нейросети сами будут зарабатывать, пока ты спишь (или плачешь).",
            "Жми на кнопку в центре экрана, не разочаровывай маму!",
            "ТЫ ЕЩЕ ТУТ? ДЕНЬГИ САМИ СЕБЯ НЕ ПОТЕРЯЮТ!"
        ];

        trigger.onclick = () => {
            windowChat.classList.toggle('open');
            badge.style.display = 'none';
        };

        closeBtn.onclick = (e) => {
            e.stopPropagation();
            windowChat.classList.remove('open');
        };

        // Функция добавления сообщений
        let msgIndex = 0;
        function addMessage() {
            if(msgIndex < script.length) {
                const d = document.createElement('div');
                d.className = 'msg gleb' + (msgIndex === script.length-1 ? ' gold' : '');
                d.innerText = script[msgIndex++];
                msgContainer.appendChild(d);
                msgContainer.scrollTop = msgContainer.scrollHeight;
                
                if(!windowChat.classList.contains('open')) {
                    badge.style.display = 'block';
                }
                setTimeout(addMessage, 4000);
            }
        }

        setTimeout(addMessage, 2000);
    </script>
</body>
</html>
