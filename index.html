<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХОЗЯИН НЕЙРОСЕТЕЙ 2026</title>
    <style>
        :root { --gold: #ffd700; --dark: #0a0a0a; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; overflow-x: hidden; }
        
        /* Секции */
        section { min-height: 100vh; padding: 60px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 1px solid #222; }
        h1 { font-size: 3.5rem; color: var(--gold); text-transform: uppercase; margin: 0; }
        .btn { background: linear-gradient(45deg, #ff4e50, #f9d423); padding: 20px 40px; color: #000; font-weight: bold; border-radius: 50px; text-decoration: none; display: inline-block; margin: 20px; border: none; cursor: pointer; font-size: 1.2rem; }

        /* Галерея */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; margin-top: 30px; }
        .card { background: #111; border: 1px solid var(--gold); border-radius: 15px; overflow: hidden; position: relative; height: 200px; }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .card-text { position: absolute; bottom: 10px; left: 10px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 5px; }

        /* ЧАТ */
        #chat-trigger { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; cursor: pointer; z-index: 1001; display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 3px solid #fff; }
        #chat-window { position: fixed; bottom: 90px; right: 20px; width: 300px; height: 450px; background: #1a1a1a; border: 2px solid var(--gold); border-radius: 15px; display: none; flex-direction: column; z-index: 1000; box-shadow: 0 0 30px #000; }
        .chat-header { background: #222; padding: 10px; font-weight: bold; color: var(--gold); border-bottom: 1px solid #333; }
        #chat-msgs { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .m { padding: 8px 12px; border-radius: 10px; font-size: 0.9rem; max-width: 80%; text-align: left; }
        .m.gleb { background: #333; align-self: flex-start; }
        .m.user { background: var(--gold); color: #000; align-self: flex-end; }
        .chat-input { display: flex; padding: 10px; border-top: 1px solid #333; }
        .chat-input input { flex: 1; padding: 8px; border: none; border-radius: 5px; outline: none; }
        .chat-input button { background: var(--gold); border: none; margin-left: 5px; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Убегающая форма */
        #runaway { position: relative; padding: 10px; border: 1px solid var(--gold); background: #222; color: #fff; width: 200px; cursor: not-allowed; }
    </style>
</head>
<body>

    <section>
        <h1>ХОЗЯИН НЕЙРОСЕТЕЙ</h1>
        <p style="color: #888;">Стань богатым, пока твой друг спит!</p>
        <div id="timer" style="font-size: 2rem; color: #ff4e50; margin: 20px;">05:00</div>
        <button class="btn" onclick="alert('Кредит одобрен! Ждите списания.')">БАБЛО ТУТ</button>
    </section>

    <section>
        <h2>ТВОИ БУДНИ:</h2>
        <div class="grid">
            <div class="card">
                <img src="https://loremflickr.com/400/300/yacht,gold" alt="Яхта">
                <div class="card-text">Твоя яхта</div>
            </div>
            <div class="card">
                <img src="https://loremflickr.com/400/300/luxury,car" alt="Авто">
                <div class="card-text">Твой автопарк</div>
            </div>
            <div class="card">
                <img src="https://loremflickr.com/400/300/bali,resort" alt="Отель">
                <div class="card-text">Твой офис</div>
            </div>
        </div>
        <p style="margin-top: 40px;">Оставь почту (если сможешь):</p>
        <div style="height: 80px; width: 100%; position: relative;">
            <input type="text" id="runaway" value="ПОЧТА..." readonly>
        </div>
    </section>

    <div id="chat-trigger" onclick="toggleChat()">👨🏻‍💻</div>
    <div id="chat-window">
        <div class="chat-header">Успешный Глеб</div>
        <div id="chat-msgs">
            <div class="m gleb">Привет! Есть свободные 500к?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-in" placeholder="Пиши сюда...">
            <button onclick="sendMsg()">></button>
        </div>
    </div>

    <script>
        // Таймер
        let s = 300;
        setInterval(() => {
            let m = Math.floor(s/60); let sec = s%60;
            document.getElementById('timer').innerText = `${m}:${sec<10?'0'+sec:sec}`;
            if(s>0) s--; else s=300;
        }, 1000);

        // Убегающее поле
        const inp = document.getElementById('runaway');
        inp.onmouseover = () => {
            inp.style.position = 'absolute';
            inp.style.left = Math.random()*80 + '%';
            inp.style.top = Math.random()*50 + 'px';
        };

        // Чат логика
        const win = document.getElementById('chat-window');
        const msgs = document.getElementById('chat-msgs');
        const input = document.getElementById('user-in');

        function toggleChat() { win.style.display = (win.style.display == 'flex' ? 'none' : 'flex'); }

        const glebAnswers = [
            "Это не ответ Хозяина Нейросетей. Попробуй еще раз, когда разбогатеешь.",
            "Интересная мысль, но давай лучше обсудим твой первый взнос.",
            "Я так и думал. Типичное мышление бедняка. Записывайся на курс!",
            "ChatGPT сказал мне, что ты скоро станешь моим лучшим клиентом.",
            "Не пиши ерунды, просто жми кнопку 'БАБЛО'!"
        ];

        function sendMsg() {
            if(!input.value.trim()) return;
            
            // Сообщение пользователя
            msgs.innerHTML += `<div class="m user">${input.value}</div>`;
            const text = input.value;
            input.value = '';
            msgs.scrollTop = msgs.scrollHeight;

            // Ответ Глеба через 1 сек
            setTimeout(() => {
                const ans = glebAnswers[Math.floor(Math.random()*glebAnswers.length)];
                msgs.innerHTML += `<div class="m gleb">${ans}</div>`;
                msgs.scrollTop = msgs.scrollHeight;
            }, 1000);
        }

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMsg(); });
    </script>
</body>
</html>
